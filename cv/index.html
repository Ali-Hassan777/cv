<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Ali Hassan — Computer Science undergraduate at Beirut Arab University." />
  <title>Ali Hassan · CV</title>
  
  <!-- Modern Professional Font: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <style>
    /* ══ CSS VARIABLES ══ */
    :root {
      --primary: #7f77dd;
      --primary-hover: #6a62c7;
      --primary-light: rgba(127, 119, 221, 0.1);
      
      --bg-body: #f8fafc;
      --bg-card: #ffffff;
      --text-main: #0f172a;
      --text-muted: #64748b;
      --text-light: #94a3b8;
      --border: #e2e8f0;
    }

    body.dark {
      --bg-body: #0f172a;
      --bg-card: #1e293b;
      --text-main: #f8fafc;
      --text-muted: #cbd5e1;
      --text-light: #64748b;
      --border: #334155;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { 
      margin: 0; font-family: 'Inter', sans-serif; 
      background-color: var(--bg-body);
      color: var(--text-main);
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    /* ══ HERO SECTION ══ */
    .page-hero {
      min-height: 100vh;
      background: #0f172a;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center; padding: 4rem 2rem; position: relative; overflow: hidden; color: #f8fafc;
    }

    /* Scrollable Fix Style */
    .scrollable-content {
      max-height: 400px;
      overflow-y: auto;
      padding-right: 10px;
    }
    .scrollable-content::-webkit-scrollbar { width: 6px; }
    .scrollable-content::-webkit-scrollbar-track { background: rgba(0,0,0,0.05); border-radius: 4px; }
    .scrollable-content::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 4px; }

    /* ══ CARDS & LAYOUT ══ */
    .container { max-width: 1100px; margin: 0 auto; display: grid; grid-template-columns: 1fr 300px; gap: 2rem; padding: 5rem 2rem; }
    @media (max-width: 850px) { .container { grid-template-columns: 1fr; } }

    .card {
      background: var(--bg-card); border-radius: 16px; padding: 2rem;
      border: 1px solid var(--border);
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
      margin-bottom: 2rem;
    }

    h2 { font-size: 1.5rem; color: var(--text-main); margin-bottom: 1.5rem; display: flex; align-items: center; gap: 12px; }
    .section-icon { display: inline-flex; align-items: center; justify-content: center; width: 36px; height: 36px; background: var(--primary-light); border-radius: 10px; font-size: 1rem; color: var(--primary); }

    /* ══ TIMELINE ══ */
    .timeline { position: relative; padding-left: 2rem; }
    .timeline::before { content: ''; position: absolute; left: 6px; top: 8px; bottom: 0; width: 2px; background: var(--border); }
    .timeline-item { position: relative; margin-bottom: 2rem; }
    .timeline-dot { position: absolute; left: -2rem; top: 6px; width: 14px; height: 14px; background: var(--bg-card); border-radius: 50%; border: 3px solid var(--primary); }
    .timeline-org { font-size: 1.1rem; font-weight: 600; margin-bottom: 4px; }
    .timeline-role { font-size: 0.85rem; color: var(--primary); margin-bottom: 0.5rem; display: flex; align-items: center; gap: 6px; }
    .timeline-date { font-size: 0.85rem; color: var(--text-light); margin-bottom: 12px; }

    /* ══ MISC ══ */
    .skill-tags { display: flex; flex-wrap: wrap; gap: 8px; }
    .skill-tag { background: var(--bg-body); border: 1px solid var(--border); padding: 6px 12px; border-radius: 8px; font-size: 0.85rem; }
    .reveal { opacity: 0; transform: translateY(30px); transition: all 0.8s ease; }
    .reveal.visible { opacity: 1; transform: translateY(0); }
    .fab-container { position: fixed; bottom: 2rem; right: 2rem; display: flex; flex-direction: column; gap: 12px; }
    .fab { width: 48px; height: 48px; border-radius: 14px; border: 1px solid var(--border); background: var(--bg-card); cursor: pointer; }
  </style>
</head>
<body>

<section class="page-hero">
  <h1>Ali Hassan</h1>
  <p>Computer Science · Beirut Arab University</p>
</section>

<main class="container">
  <div class="main-column">
    
    <!-- EDUCATION SECTION (FIXED WITH SCROLL) -->
    <section id="education" class="card reveal">
      <h2><span class="section-icon"><i class="fa-solid fa-graduation-cap"></i></span> Education</h2>
      <div class="scrollable-content">
        <div class="timeline">
          <div class="timeline-item">
            <div class="timeline-dot"></div>
            <div class="timeline-org">Beirut Arab University</div>
            <div class="timeline-role">BSc Computer Science</div>
            <div class="timeline-date">Expected Graduation: 2026</div>
          </div>
          <!-- Add more items here, and the scrollbar will automatically appear -->
        </div>
      </div>
    </section>

    <!-- Experience & Projects remain here as standard cards -->
  </div>

  <aside class="sidebar">
    <!-- Sidebar contents -->
  </aside>
</main>

<div class="fab-container">
  <button class="fab" id="btn-dark"><i class="fa-solid fa-moon"></i></button>
</div>

<script>
  /* Reveal Animation */
  const revealObserver = new IntersectionObserver((entries) => {
    entries.forEach((e) => { if (e.isIntersecting) e.target.classList.add('visible'); });
  }, { threshold: 0.05 });
  document.querySelectorAll('.reveal').forEach(el => revealObserver.observe(el));

  /* Theme Toggle */
  const darkBtn = document.getElementById('btn-dark');
  darkBtn.addEventListener('click', () => {
    document.body.classList.toggle('dark');
  });
</script>
</body>
</html>
